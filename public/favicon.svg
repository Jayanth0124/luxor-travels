<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- BACKGROUND -->
  <rect width="512" height="512" rx="140" fill="#0F1110"/>

  <!-- SOFT INNER GRADIENT -->
  <rect width="512" height="512" rx="140" fill="url(#bgGlow)"/>

  <!-- OUTER LUXURY BORDER -->
  <rect
    x="26"
    y="26"
    width="460"
    height="460"
    rx="118"
    stroke="url(#goldBorder)"
    stroke-width="4"
    opacity="0.6"
  />

  <!-- INNER SOFT BORDER -->
  <rect
    x="42"
    y="42"
    width="428"
    height="428"
    rx="102"
    stroke="#C5A059"
    stroke-width="1.5"
    opacity="0.18"
  />

  <!-- GOLDEN AMBIENCE -->
  <circle
    cx="256"
    cy="170"
    r="170"
    fill="url(#goldGlow)"
    opacity="0.22"
  />

  <!-- MAIN L LETTER -->
  <path
    d="M188 132H252V328H354V382H188V132Z"
    fill="url(#luxGold)"
  />

  <!-- LUXURY SHINE -->
  <path
    d="M188 132H252V328H354"
    stroke="rgba(255,255,255,0.25)"
    stroke-width="10"
    stroke-linecap="round"
    opacity="0.35"
  />

  <!-- MINI BRAND MARK -->
  <circle
    cx="370"
    cy="140"
    r="10"
    fill="#D9B56D"
    opacity="0.9"
  />

  <!-- DEFINITIONS -->
  <defs>

    <!-- BACKGROUND GLOW -->
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 120) rotate(90) scale(420)">
      <stop stop-color="#171917"/>
      <stop offset="1" stop-color="#0B0C0B"/>
    </radialGradient>

    <!-- GOLD BORDER -->
    <linearGradient id="goldBorder" x1="40" y1="40" x2="470" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4D08A"/>
      <stop offset="0.5" stop-color="#C5A059"/>
      <stop offset="1" stop-color="#8B6A34"/>
    </linearGradient>

    <!-- MAIN GOLD -->
    <linearGradient id="luxGold" x1="190" y1="120" x2="360" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7D994"/>
      <stop offset="0.45" stop-color="#D4AF63"/>
      <stop offset="1" stop-color="#8F6A34"/>
    </linearGradient>

    <!-- GOLD GLOW -->
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 170) rotate(90) scale(170)">
      <stop stop-color="#D8B46A"/>
      <stop offset="1" stop-color="#D8B46A" stop-opacity="0"/>
    </radialGradient>

  </defs>

</svg>